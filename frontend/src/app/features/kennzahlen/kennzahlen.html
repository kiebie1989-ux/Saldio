<div class="kennzahlen-header">
  <h1>Kennzahlen</h1>
  <div class="filter">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Mandant</mat-label>
      <mat-select [value]="selectedMandant()" (selectionChange)="onMandantChange($event.value)">
        @for (m of mandanten(); track m.id) {
          <mat-option [value]="m.name">{{ m.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Jahr</mat-label>
      <mat-select [value]="jahr()" (selectionChange)="onJahrChange($event.value)">
        @for (j of jahre; track j) {
          <mat-option [value]="j">{{ j }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>
</div>

<mat-card>
  <mat-card-content>
    <table mat-table [dataSource]="kennzahlen()" class="kennzahlen-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Kennzahl</th>
        <td mat-cell *matCellDef="let k">{{ k.name }}</td>
      </ng-container>

      <ng-container matColumnDef="wert">
        <th mat-header-cell *matHeaderCellDef class="num">Wert</th>
        <td mat-cell *matCellDef="let k" class="num">{{ k.wert }} {{ k.einheit }}</td>
      </ng-container>

      <ng-container matColumnDef="zielwert">
        <th mat-header-cell *matHeaderCellDef class="num">Ziel</th>
        <td mat-cell *matCellDef="let k" class="num">{{ k.zielwert ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="ampel">
        <th mat-header-cell *matHeaderCellDef>Ampel</th>
        <td mat-cell *matCellDef="let k">
          <mat-icon [class]="ampelClass(k.ampel)">{{ ampelIcon(k.ampel) }}</mat-icon>
        </td>
      </ng-container>

      <ng-container matColumnDef="interpretation">
        <th mat-header-cell *matHeaderCellDef>Interpretation</th>
        <td mat-cell *matCellDef="let k" class="interpretation">{{ k.interpretation }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="spalten"></tr>
      <tr mat-row *matRowDef="let row; columns: spalten"></tr>
    </table>
  </mat-card-content>
</mat-card>
