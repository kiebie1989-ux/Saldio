<div class="scroll">
  <table mat-table [dataSource]="zeilen()" class="struktur">
    <ng-container matColumnDef="position" sticky>
      <th mat-header-cell *matHeaderCellDef>Position</th>
      <td mat-cell *matCellDef="let z">{{ z.position }}</td>
    </ng-container>

    @for (m of monate(); track m) {
      <ng-container [matColumnDef]="m">
        <th mat-header-cell *matHeaderCellDef class="num">{{ m.slice(5) }}</th>
        <td mat-cell *matCellDef="let z" class="num">{{ z.monate[m] | number: '1.0-0' }}</td>
      </ng-container>
    }

    <ng-container matColumnDef="ytd">
      <th mat-header-cell *matHeaderCellDef class="num ytd">YTD</th>
      <td mat-cell *matCellDef="let z" class="num ytd">{{ z.ytd | number: '1.0-0' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="spalten()"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: spalten()"
      [class.summe]="row.art === 'SUMME'"
      [class.pruefung]="row.art === 'PRUEFUNG'"
    ></tr>
  </table>
</div>
