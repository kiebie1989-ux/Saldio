# Produktionsprofil: alle sensiblen Werte MÜSSEN per Umgebungsvariable gesetzt werden
# (keine Default-Secrets). Aktivierung: SPRING_PROFILES_ACTIVE=prod
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    properties:
      hibernate.format_sql: false
  thymeleaf:
    cache: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

bwa:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  ki:
    provider: ${BWA_KI_PROVIDER:ollama}

logging:
  level:
    root: INFO
    com.bwa.controlling: INFO
