spring:
  application:
    name: controlling-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bwa}
    username: ${DB_USER:bwa}
    password: ${DB_PASSWORD:bwa}
  jpa:
    hibernate:
      ddl-auto: validate          # Schema gehört Flyway, nicht Hibernate
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  security:
    oauth2:
      resourceserver:
        jwt:
          # jwk-set-uri wird lazy (erst bei Token-Validierung) abgerufen -> kein Keycloak beim Start nötig.
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/bwa/protocol/openid-connect/certs}
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/bwa}
  ai:
    # Beans werden geladen, verbinden aber erst beim tatsächlichen Aufruf (lazy).
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
      init:
        pull-model-strategy: never
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.2:1b}
    openai:
      base-url: ${OPENAI_BASE_URL:https://openrouter.ai/api}
      api-key: ${OPENAI_API_KEY:placeholder}
      chat:
        options:
          model: ${OPENAI_MODEL:meta-llama/llama-3.2-1b-instruct}

# KI-Kommentar-Schicht. provider=none -> deterministisch regelbasiert (Default).
# provider=ollama|openai -> echtes LLM mit Fallback auf regelbasiert bei Fehler.
bwa:
  ki:
    provider: ${BWA_KI_PROVIDER:none}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized   # Details nur für authentifizierte Aufrufer

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework  # korrekte URLs hinter TLS-Reverse-Proxy
