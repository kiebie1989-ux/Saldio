# Produktions-Stack (On-Prem). Konfiguration über .env (Vorlage: .env.example).
# Start: docker compose -f docker-compose.prod.yml --env-file .env up -d --build
services:
  caddy:
    image: caddy:2-alpine
    container_name: bwa-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      AUTH_DOMAIN: ${AUTH_DOMAIN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [frontend, keycloak]

  frontend:
    build: ./frontend
    image: bwa-frontend:latest
    container_name: bwa-frontend
    restart: unless-stopped
    # Laufzeit-Config (config.json) wird beim Start im Container aus diesen Variablen gerendert.
    environment:
      ISSUER: ${AUTH_ORIGIN}/realms/bwa
      CLIENT_ID: bwa-app
      REQUIRE_HTTPS: "true"
    depends_on: [backend]

  backend:
    build: ./backend
    image: bwa-backend:latest
    container_name: bwa-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://app-db:5432/bwa
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Issuer-Claim wird gegen die oeffentliche Auth-URL geprueft; JWKS intern ueber das
      # Docker-Netz geholt (kein TLS-Truststore noetig, schneller).
      KEYCLOAK_ISSUER_URI: ${AUTH_ORIGIN}/realms/bwa
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/bwa/protocol/openid-connect/certs
      CORS_ALLOWED_ORIGINS: ${APP_ORIGIN}
      BWA_KI_PROVIDER: ${BWA_KI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    depends_on:
      app-db:
        condition: service_healthy

  app-db:
    image: postgres:16-alpine
    container_name: bwa-app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bwa
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - app_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d bwa"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Rendert den Keycloak-Realm aus dem Template: setzt die echten Login-Redirect-/Web-Origins
  # (APP_ORIGIN) ein. Laeuft einmalig vor Keycloak.
  realm-init:
    image: alpine:3.21
    container_name: bwa-realm-init
    command:
      - sh
      - -c
      - 'sed "s|__APP_ORIGIN__|${APP_ORIGIN}|g" /tpl/${REALM_TEMPLATE:-bwa-realm.template.json} > /shared/bwa-realm.json && echo "Realm (${REALM_TEMPLATE:-bwa-realm.template.json}) gerendert fuer Origin: ${APP_ORIGIN}"'
    volumes:
      - ./infra/keycloak:/tpl:ro
      - realm_import:/shared

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: bwa-keycloak
    restart: unless-stopped
    command: ["start", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: ${AUTH_ORIGIN}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
    volumes:
      - realm_import:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
      realm-init:
        condition: service_completed_successfully

  keycloak-db:
    image: postgres:16-alpine
    container_name: bwa-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - kc_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME} -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Self-hosted KI (lokal, keine Daten nach außen). Modell separat ziehen (siehe docs/betrieb.md).
  ollama:
    image: ollama/ollama:latest
    container_name: bwa-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

volumes:
  caddy_data: {}
  caddy_config: {}
  app_db_data: {}
  kc_db_data: {}
  ollama_data: {}
  realm_import: {}
