# Override für den LOKALEN Prod-Smoke-Test. Beweist den Produktionspfad (gerenderter Realm,
# Laufzeit-Config, Prod-Keycloak, Backend prod-Profil, Caddy-TLS, End-to-End) ohne öffentliche Domain.
#
# Start:
#   docker compose -f docker-compose.prod.yml -f docker-compose.prod.test.yml \
#     --env-file .env.local-test up -d --build
#
# Einzige Abweichungen zum echten Betrieb (bewusst, dokumentiert):
#   - Caddy 'tls internal' (self-signed) statt Let's Encrypt -> keine öffentliche DNS/Domain nötig
#   - Nicht-Standard-Host-Ports 8980/8943 (443 lokal evtl. belegt)
# Realm-Redirects, OIDC-Issuer, Frontend-Config und KC_HOSTNAME kommen aus .env.local-test
# (APP_ORIGIN/AUTH_ORIGIN) - identischer Pfad wie produktiv.
services:
  caddy:
    ports: !override
      - "8980:80"
      - "8943:443"
    volumes: !override
      - ./infra/caddy/Caddyfile.local-test:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
